<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Нейро-репетитор</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
</head>
<body>
    <div id="app">

        <div id="screen-loading" class="screen active">
            <div class="spinner"></div>
            <p id="loading-text">Загрузка приложения...</p>
        </div>

        <div id="screen-main-menu" class="screen">
            <h1>🧠 Нейро-репетитор</h1>
            <div class="menu-options">
                <button class="button" data-exam-type="oge">📝 ОГЭ (9 класс)</button>
                <button class="button" data-exam-type="ege">🎓 ЕГЭ (11 класс)</button>
                <button class="menu-btn" onclick="showHelp()">🛠 Помощь</button>
                <button class="menu-btn" onclick="showProfile()">👤 Мой профиль</button>
            </div>
        </div>

        <div id="screen-subjects" class="screen">
            <h1>Выберите предмет</h1>
        </div>

        <div id="task-screen" class="screen">
            <div class="progress-bar" id="test-progress">Вопрос 1 из 15</div>
            
            <div id="task-image-container"></div>
            <div id="task-text" style="margin: 10px 0; font-weight: 500;"></div>

            <button onclick="reportTask()" class="report-link">🚩 Задание обрезано / С ошибкой</button>

            <div class="answer-block">
                <input type="text" id="user-answer" placeholder="Введите ответ...">
                <p class="hint">* Число или десятичная дробь (через запятую)</p>
            </div>
            
            <button class="submit-btn" onclick="submitAnswer()">Ответить</button>
        </div>

        <div id="quick-result-screen" class="screen">
            <h2 id="quick-result-title"></h2>
            <button class="button" onclick="nextTask()">Следующий вопрос ➡️</button>
        </div>

        <div id="test-finish-screen" class="screen">
            <h2>🏁 Тест завершен!</h2>
            <div class="final-card">
                <p>Результат: <b id="final-score">0</b> из 15</p>
                <p>Ошибок: <b id="final-mistakes" style="color: #ff5252;">0</b></p>
            </div>
            
            <div id="review-buttons" style="display:none;">
                <button class="submit-btn" onclick="startReview()">🧠 Разобрать ошибки</button>
            </div>
            <button class="button secondary" onclick="finishSession()">В главное меню</button>
        </div>

        <div id="review-screen" class="screen">
            <div class="progress-bar" id="review-progress">Разбор ошибки 1</div>
            
            <div class="mistake-card" id="review-answers-block">
                </div>
            
            <div id="review-image-container"></div>
            
            <div class="explanation-box" id="review-explanation">
                <button class="submit-btn" onclick="runAIExplanation()">🧠 Разбор этой задачи с ИИ</button>
            </div>
            
            <div class="btn-group">
                <button class="button secondary" id="simplify-btn" onclick="runAIExplanation(true)" style="display:none;">🍎 Проще</button>
                <button class="button" onclick="nextReview()">Дальше ➡️</button>
            </div>
        </div>

    </div>

    <script src="script.js?v=2.3"></script>

    <script>
        // Небольшая доп. функция для кнопки жалобы, так как SERVER_URL в script.js
        function reportTask() {
            if (!currentTask || !currentTask.id) return;
            if (confirm('Задача будет удалена из базы. Вы уверены?')) {
                fetch(`https://neuro-master.online/repetitor-api/report_task/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task_id: currentTask.id })
                }).then(() => getRandomTask());
            }
        }
    </script>
</body>
</html>
